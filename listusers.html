<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Attendance System - User Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=DM+Serif+Display&display=swap');

        body {
            min-height: 100vh;
            background: linear-gradient(180deg, #f4f7fc, #e9eff9);
            font-family: 'Manrope', sans-serif;
            color: #21344f;
        }

        .title {
            font-family: 'DM Serif Display', serif;
            color: #1f3557;
        }

        .card-soft {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(90, 115, 147, 0.18);
            border-radius: 16px;
            box-shadow: 0 16px 30px rgba(31, 51, 79, 0.12);
        }

        .btn-soft {
            border: 1px solid rgba(63, 108, 166, 0.35);
            color: #31598a;
            background: #f6f9ff;
            border-radius: 10px;
            font-weight: 600;
        }

        .btn-delete {
            background: #ffecee;
            border: 1px solid #f2bcc4;
            color: #9a3444;
            border-radius: 10px;
            font-weight: 600;
        }
    </style>
</head>
<body>
<div class="container py-4 py-md-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="title mb-1">User Management</h1>
            <p class="text-muted mb-0">Manage registered users | Date: {{ datetoday2 }}</p>
        </div>
        <div class="d-flex gap-2 align-items-center">
            <span class="badge text-bg-light border px-3 py-2">Total Users: {{ totalreg }}</span>
            <a href="/" class="btn btn-soft">Back to Home</a>
        </div>
    </div>

    <div class="card-soft p-3 p-md-4">
        <div class="table-responsive">
            <table class="table table-striped align-middle mb-0">
                <thead>
                <tr>
                    <th>S No</th>
                    <th>Name</th>
                    <th>ID</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                {% if l %}
                    {% for i in range(l) %}
                    <tr>
                        <td>{{ i + 1 }}</td>
                        <td>{{ names[i] }}</td>
                        <td>{{ rolls[i] }}</td>
                        <td>
                            <a class="btn btn-delete btn-sm" href="/deleteuser?user={{ userlist[i] }}">Delete</a>
                        </td>
                    </tr>
                    {% endfor %}
                {% else %}
                    <tr>
                        <td colspan="4" class="text-center text-muted py-4">No users enrolled yet.</td>
                    </tr>
                {% endif %}
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
